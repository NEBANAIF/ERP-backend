
# ── Server ───────────────────────────────────────────────
server.port=8080

# ── MySQL Database ────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/abuki_erp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=pass123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Hibernate / JPA ───────────────────────────────────────
# 'update' creates tables automatically if they don't exist
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Jackson ───────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false