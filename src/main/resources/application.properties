# ── Server ───────────────────────────────────────────────
server.port=8080

# ── MySQL Database ────────────────────────────────────────
# Make sure MySQL is running and stokio_db exists
# Run this in MySQL first: CREATE DATABASE stokio_db;
spring.datasource.url=jdbc:mysql://localhost:3306/stokio_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=pass123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool settings
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# ── Hibernate / JPA ───────────────────────────────────────
# 'update' = Hibernate creates/updates tables automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ── Jackson (dates as strings not timestamps) ─────────────
spring.jackson.serialization.write-dates-as-timestamps=false